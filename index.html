<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOXL Daily Signal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .card { background: white; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-gray-100 min-h-screen py-8">
  <div class="max-w-lg mx-auto px-4">
    <div class="card rounded-3xl p-8">
      <h1 class="text-3xl font-bold text-center mb-2">SOXL Daily Signal</h1>
      <p class="text-center text-gray-600 mb-8">EMA 9 • SMA 50 • RSI 14</p>

      <div class="space-y-6">
        <!-- API Key -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Finnhub API Key</label>
          <input id="apiKey" type="password" 
                 class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500"
                 placeholder="Paste your Finnhub key here">
        </div>

        <!-- Symbol -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Symbol</label>
          <input id="symbol" type="text" value="SOXL"
                 class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-center font-mono text-lg">
        </div>

        <button onclick="checkSignal()" 
                class="w-full bg-black hover:bg-gray-800 text-white font-semibold py-4 rounded-2xl transition">
          Check Signal
        </button>
      </div>

      <!-- Results -->
      <div id="results" class="mt-8 hidden">
        <div id="error" class="hidden bg-red-100 text-red-700 p-4 rounded-2xl text-center font-medium"></div>

        <div class="grid grid-cols-2 gap-4 mt-6">
          <div class="bg-gray-50 p-4 rounded-2xl text-center">
            <p class="text-xs text-gray-500">Last Price</p>
            <p id="price" class="text-3xl font-bold text-gray-900 mt-1">--</p>
          </div>
          <div class="bg-gray-50 p-4 rounded-2xl text-center">
            <p class="text-xs text-gray-500">RSI 14</p>
            <p id="rsi" class="text-3xl font-bold mt-1">--</p>
          </div>
          <div class="bg-gray-50 p-4 rounded-2xl text-center">
            <p class="text-xs text-gray-500">EMA 9</p>
            <p id="ema" class="text-3xl font-bold mt-1">--</p>
          </div>
          <div class="bg-gray-50 p-4 rounded-2xl text-center">
            <p class="text-xs text-gray-500">SMA 50</p>
            <p id="sma" class="text-3xl font-bold mt-1">--</p>
          </div>
        </div>

        <div id="signal" class="mt-8 text-center p-6 rounded-3xl text-4xl font-bold"></div>

        <div id="reason" class="mt-4 text-sm text-gray-600 text-center"></div>
      </div>
    </div>

    <p class="text-center text-xs text-gray-500 mt-8">
      Built as a replacement for the broken GitHub Pages app • Data from Finnhub.io
    </p>
  </div>

  <script>
    async function checkSignal() {
      const apiKey = document.getElementById('apiKey').value.trim();
      const symbol = document.getElementById('symbol').value.trim().toUpperCase();

      const results = document.getElementById('results');
      const errorDiv = document.getElementById('error');
      results.classList.remove('hidden');
      errorDiv.classList.add('hidden');

      if (!apiKey) {
        showError("Please paste your Finnhub API key");
        return;
      }
      if (!symbol) {
        showError("Please enter a symbol");
        return;
      }

      try {
        // Fetch daily candles (last 100 days should be enough for SMA 50 + RSI)
        const url = `https://finnhub.io/api/v1/stock/candle?symbol=${symbol}&resolution=D&from=${Math.floor(Date.now()/1000)-7776000}&to=${Math.floor(Date.now()/1000)}&token=${apiKey}`;
        
        const res = await fetch(url);
        const data = await res.json();

        if (data.s !== "ok" || !data.c || data.c.length < 50) {
          throw new Error(data.error || "Not enough data or invalid symbol");
        }

        const closes = data.c;
        const currentPrice = closes[closes.length - 1];

        // EMA 9
        const ema9 = calculateEMA(closes, 9);

        // SMA 50
        const sma50 = calculateSMA(closes, 50);

        // RSI 14
        const rsi14 = calculateRSI(closes, 14);

        // Display values
        document.getElementById('price').textContent = currentPrice.toFixed(2);
        document.getElementById('ema').textContent = ema9.toFixed(2);
        document.getElementById('sma').textContent = sma50.toFixed(2);
        document.getElementById('rsi').textContent = rsi14.toFixed(1);

        // Simple signal logic
        let signalText = "NEUTRAL";
        let signalColor = "bg-gray-200 text-gray-700";

        const priceAboveEMA = currentPrice > ema9;
        const emaAboveSMA = ema9 > sma50;
        const rsiOversold = rsi14 < 30;
        const rsiOverbought = rsi14 > 70;

        if (priceAboveEMA && emaAboveSMA && rsi14 < 70) {
          signalText = "BUY";
          signalColor = "bg-green-500 text-white";
        } else if (!priceAboveEMA && !emaAboveSMA && rsi14 > 30) {
          signalText = "SELL";
          signalColor = "bg-red-500 text-white";
        }

        const signalDiv = document.getElementById('signal');
        signalDiv.textContent = signalText;
        signalDiv.className = `mt-8 text-center p-6 rounded-3xl text-4xl font-bold ${signalColor}`;

        document.getElementById('reason').innerHTML = `
          Price: ${priceAboveEMA ? 'Above' : 'Below'} EMA9<br>
          EMA9: ${emaAboveSMA ? 'Above' : 'Below'} SMA50<br>
          RSI: ${rsi14.toFixed(1)} ${rsiOversold ? '(Oversold)' : rsiOverbought ? '(Overbought)' : ''}
        `;

      } catch (err) {
        showError(err.message || "Failed to fetch data. Check your API key and symbol.");
      }
    }

    function showError(msg) {
      const errorDiv = document.getElementById('error');
      errorDiv.textContent = msg;
      errorDiv.classList.remove('hidden');
    }

    // Helper functions
    function calculateSMA(closes, period) {
      const slice = closes.slice(-period);
      return slice.reduce((a, b) => a + b, 0) / period;
    }

    function calculateEMA(closes, period) {
      let ema = closes[0];
      const multiplier = 2 / (period + 1);
      for (let i = 1; i < closes.length; i++) {
        ema = (closes[i] * multiplier) + (ema * (1 - multiplier));
      }
      return ema;
    }

    function calculateRSI(closes, period) {
      let gains = 0, losses = 0;
      for (let i = closes.length - period; i < closes.length; i++) {
        const change = closes[i] - closes[i-1];
        if (change > 0) gains += change;
        else losses -= change;
      }
      const avgGain = gains / period;
      const avgLoss = losses / period;
      if (avgLoss === 0) return 100;
      const rs = avgGain / avgLoss;
      return 100 - (100 / (1 + rs));
    }
  </script>
</body>
</html>
